#spring.application.name=media-wrangler


# Database connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/media_wrangler
spring.datasource.username=media_wrangler
spring.datasource.password=media_wrangler

#TODO: Look up how to hide the password

# Specify the DBMS
spring.jpa.database = MYSQL

# Show or not log for each sql query
spring.jpa.show-sql = false

# Hibernate ddl auto (create, create-drop, update)
spring.jpa.hibernate.ddl-auto = update

# Use spring.jpa.properties.* for Hibernate native properties (the prefix is
# stripped before adding them to the entity manager)
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect